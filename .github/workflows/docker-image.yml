name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
    
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Docker Build
        run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Setup Java
        uses: actions/checkout@v5
        with:
          distribution: 'temurin'
          java-version: '21'
        
      - name: Build Jar
        run: |
          chmod +x ./mvnw 
          ./mvnw clean package -DskipTests
     
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHB_USERNAME }}/spring-boot-ci-demo:latest .
    
      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKERHB_USERNAME }}/spring-boot-ci-demo:latest
    
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHB_USERNAME }} --password-stdin
            docker stop ci-demo || true
            docker rm ci-demo || true
            docker pull ${{ secrets.DOCKERHB_USERNAME }}/spring-boot-ci-demo:latest
            docker run -d --name ci-demo -p 80:8080 ${{ secrets.DOCKERHB_USERNAME }}/spring-boot-ci-demo:latest